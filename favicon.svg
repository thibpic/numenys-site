<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Fond sombre arrondi -->
  <rect width="64" height="64" rx="10" fill="#14161a"/>

  <!-- Arêtes arrière (transparentes) -->
  <g stroke="#c8b48a" stroke-width="1.2" opacity="0.3" fill="none" stroke-linecap="round">
    <line x1="8"  y1="13" x2="45" y2="13"/>
    <line x1="8"  y1="13" x2="8"  y2="41"/>
    <line x1="45" y1="13" x2="45" y2="41"/>
    <line x1="8"  y1="41" x2="45" y2="41"/>
  </g>

  <!-- Piliers arrière → avant -->
  <g stroke="#c8b48a" stroke-width="1.2" opacity="0.45" fill="none" stroke-linecap="round">
    <line x1="8"  y1="13" x2="19" y2="24"/>
    <line x1="45" y1="13" x2="56" y2="24"/>
    <line x1="45" y1="41" x2="56" y2="52"/>
    <line x1="8"  y1="41" x2="19" y2="52"/>
  </g>

  <!-- Face avant (nette) -->
  <g stroke="#c8b48a" stroke-width="2" opacity="0.95" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <rect x="19" y="24" width="37" height="28" rx="0"/>
  </g>

  <!-- Nœuds arrière -->
  <g fill="#c8b48a" opacity="0.35">
    <circle cx="8"  cy="13" r="2.2"/>
    <circle cx="45" cy="13" r="2.2"/>
    <circle cx="45" cy="41" r="2.2"/>
    <circle cx="8"  cy="41" r="2.2"/>
  </g>

  <!-- Nœuds avant -->
  <g fill="#c8b48a" opacity="0.95">
    <circle cx="19" cy="24" r="3"/>
    <circle cx="56" cy="24" r="3"/>
    <circle cx="56" cy="52" r="3"/>
    <circle cx="19" cy="52" r="3"/>
  </g>
</svg>
